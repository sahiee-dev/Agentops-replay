services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: agentops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_superuser_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app_user_setup:
    image: postgres:15-alpine
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres_superuser_password
    command:
      - /bin/sh
      - -c
      - |
        psql -h db -U postgres -tc "SELECT 1 FROM pg_roles WHERE rolname='agentops_app'" | grep -q 1 || psql -h db -U postgres -c "CREATE USER agentops_app WITH PASSWORD 'apppassword';"
        psql -h db -U postgres -tc "SELECT 1 FROM pg_database WHERE datname='agentops'" | grep -q 1 || psql -h db -U postgres -c "CREATE DATABASE agentops;"
        psql -h db -U postgres -d agentops -c "GRANT ALL PRIVILEGES ON SCHEMA public TO agentops_app;"
    restart: "no"

  server:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      AGENTOPS_DATABASE_URL: postgresql://agentops_app:apppassword@db:5432/agentops
      MIGRATION_DATABASE_URL: postgresql://postgres:postgres_superuser_password@db:5432/agentops
      AGENTOPS_LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    command: >
      sh -c "
        cd /app/backend &&
        AGENTOPS_DATABASE_URL=$$MIGRATION_DATABASE_URL alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

volumes:
  pgdata:
